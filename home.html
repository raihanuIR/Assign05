<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>
    
    <!-- font awesome -->
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <!-- Font -->
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    
    <!-- Tailwind CSS and DaisyUI -->
    
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <!-- Style Sheet -->
    <link rel="stylesheet" href="./styles.css">
</head>
<body class="bg-[#F8FAFC]">
    <header>
        <div class="navbar bg-base-100 shadow-sm flex justify-around px-14 py-3">
            <div class="flex-1">
                <a class="btn btn-ghost text-xl">
                    <img class="w-[35px] h-auto" src="./assets/github-logo.png" alt="GitHub Logo">
                    <span class="font-bangla text-xl font-bold">GitHub Issues Tracker</span>
                </a>
            </div>
            <div class="flex gap-2">
                <input type="text" id="input-search" placeholder="Search issues..." class="input input-bordered rounded-md w-[250px]"/>
                <div class="">
                    <button class="btn btn-primary " id="btn-search">Search</button>
                </div>
            </div>
        </div>
    </header>


    <section class="md:max-w-6xl mx-auto bg-white p-6 mt-6 rounded-lg shadow-sm mb-1">
            <div class="flex flex-wrap gap-2 ">
                <button id="tab-all" onclick="switchTab('all')" class="btn btn-primary">All</button>
                <button id="tab-open" onclick="switchTab('open')" class="btn btn-primary">Open</button>
                <button id="tab-closed" onclick="switchTab('closed')" class="btn btn-primary">Closed</button>
            </div>
    </section>
    
    
    
    <section id="issue-container" class="max-w-6xl mx-auto bg-white  mt-5 rounded-xl shadow-sm ">
    
        <div class="flex flex-col md:flex-row justify-between p-6 md:items-center gap-4 border-b-1 border-[#E4E4E7] w-full">
            <div class="flex gap-4 items-center">
                <div class="w-12 h-12 rounded-full bg-[#F5F3FF] flex items-center justify-center shrink-0">
                    <img class="w-6 h-auto" src="./assets/Aperture.png" alt="Aperture Icon">
                </div>
                <div>
                    <p class="text-xl font-bold text-slate-800"><span id="issue-count">0</span> Issues</p>
                    <p class="text-slate-500 text-sm">Track and manage your project issues</p>
                </div>
            </div>
            
            <div class="flex gap-6">
                <div class="flex items-center gap-2">
                    <div class="w-2.5 h-2.5 rounded-full bg-green-500"></div>
                    <p class="font-semibold text-slate-700 text-sm">Open</p>
                </div>
            
                <div class="flex items-center gap-2">
                    <div class="w-2.5 h-2.5 rounded-full bg-purple-500"></div>
                    <p class="font-semibold text-slate-700 text-sm">Closed</p>
                </div>
            </div>
        </div>
        
        <section id="issues-container"
            class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mt-2 mb-10 p-6">
        </section>

    </section>

    <section id="spinner" class="flex items-center justify-center py-20">
        <span class="loading loading-bars loading-xl"></span>
    </section>


    <!-- Open the modal using ID.showModal() method -->
    <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->

    <dialog id="modal" class="modal modal-bottom sm:modal-middle ">
        <div class="modal-box max-w-[700px] h-auto">
            <div id="details-container" class="p-8 ">

            </div>
            <div class="modal-action">
                <form method="dialog">
                    <!-- if there is a button in form, it will close the modal -->
                    <button class="btn">Close</button>
                </form>
            </div>
        </div>
    </dialog>
    
    
    <script src="home.js"></script>
</body>
</html>
